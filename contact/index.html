<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim – Mely</title>
  <link rel="icon" type="image/x-icon"href="../images/Mely.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Mouse Memoirs';
      src: url('../fontlar/MadimiOne-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a2e1a;
      --green-mid:   #2e4a2e;
      --green-light: #4a7a4a;
      --accent:      #f5a623;
      --accent2:     #e8c84a;
      --white:       #ffffff;
      --card-bg:     rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.15);
      --radius:      18px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Public Sans', sans-serif;
      background: var(--green-dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GRADIENT MESH ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 10%, #3a6b3a 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 80%, #2a5a2a 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 50%, #0e1e0e 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      backdrop-filter: blur(6px);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      font-family: 'Public Sans', sans-serif;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--white);
      font-family: 'Public Sans', sans-serif;
      font-size: 15px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent2); }

    .nav-links .active a {
      background: var(--accent);
      color: #1a1a1a;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 6px;
    }

    .nav-links .underline a {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .logo-wrap {
      width: 92px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .logo-text {
      font-family: 'Public Sans', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--white);
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 6px;
      border: 2px solid var(--accent);
    }

    /* ── PAGE WRAPPER ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    /* ── MAIN LAYOUT ── */
    .contact-layout {
      display: flex;
      align-items: center;
      gap: 64px;
      max-width: 1000px;
      width: 100%;
    }

    /* ── CHARACTER SIDE ── */
    .char-side {
      flex: 0 0 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.8s ease both;
    }

    .char-side img {
      width: 100%;
      max-width: 400px;
      object-fit: contain;
      filter: drop-shadow(0 16px 40px rgba(0,0,0,0.5));
      display: block;
    }

    /* ── CONTENT SIDE ── */
    .content-side {
      flex: 1;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .page-label {
      font-family: 'Public Sans', sans-serif;
      font-style: italic;
      font-size: 13px;
      color: var(--accent2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.85;
    }

    .page-title {
      font-family: 'Mouse Memoirs', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .page-subtitle {
      font-family: 'Public Sans', sans-serif;
      font-style: italic;
      font-size: clamp(0.88rem, 1.8vw, 1rem);
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 40px;
    }

    /* ── SOCIAL BUTTONS ── */
    .social-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--white);
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s ease, background 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    /* Individual brand accents on hover */
    .social-btn.behance:hover  { background: rgba(23,105,255,0.22); border-color: rgba(23,105,255,0.5); }
    .social-btn.linkedin:hover { background: rgba(10,102,194,0.22); border-color: rgba(10,102,194,0.5); }
    .social-btn.instagram:hover{ background: rgba(214,41,118,0.22); border-color: rgba(214,41,118,0.5); }
    .social-btn.discord:hover  { background: rgba(88,101,242,0.22); border-color: rgba(88,101,242,0.5); }
    .social-btn.mail:hover     { background: rgba(232,200,74,0.18); border-color: rgba(232,200,74,0.5); color: var(--accent2); }

    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .social-icon svg { display: block; }

    .behance  .social-icon { background: rgba(23,105,255,0.25); }
    .linkedin .social-icon { background: rgba(10,102,194,0.25); }
    .instagram .social-icon { background: rgba(214,41,118,0.25); }
    .discord  .social-icon { background: rgba(88,101,242,0.25); }
    .mail     .social-icon { background: rgba(232,200,74,0.2); }

    .social-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .social-name {
      font-family: 'Public Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.03em;
    }
    .social-handle {
      font-size: 11.5px;
      opacity: 0.6;
      font-style: italic;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.15) 70%, transparent);
      margin: 36px 0;
    }

    /* ── COFFEE NOTE ── */
    .coffee-note {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(245,166,35,0.1);
      border: 1px solid rgba(245,166,35,0.25);
      border-radius: 12px;
      padding: 14px 20px;
      max-width: 380px;
    }
    .coffee-note span {
      font-size: 22px;
      flex-shrink: 0;
    }
    .coffee-note p {
      font-family: 'Public Sans', sans-serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      line-height: 1.55;
    }

    .page-title {
      font-family: 'Mouse Memoirs', sans-serif;
    }
    .coffee-note p strong {
      color: var(--accent2);
      font-style: normal;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .contact-layout {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 32px;
      }
      .char-side {
        flex: unset;
        width: 100%;
        max-width: 280px;
      }
      .page-subtitle { max-width: 100%; }
      .social-grid { justify-content: center; }
      .coffee-note { margin: 0 auto; }
    }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { gap: 18px; }
      .nav-links a { font-size: 13px; }
      .nav-links .active a { padding: 5px 12px; }
    }

    @media (max-width: 480px) {
      .nav-links { gap: 12px; }
      .logo-text { font-size: 18px; }
      .social-btn { padding: 10px 14px; }
      .social-icon { width: 30px; height: 30px; }
      .char-side { max-width: 220px; }
    }
  </style>
</head>
<body>
